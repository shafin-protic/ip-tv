<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IPTV Bengali Player - Working Version</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0f1e;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #eef2ff;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .header {
            background: #0f1422;
            padding: 0.8rem 1.5rem;
            border-bottom: 1px solid #2d3348;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo h1 {
            font-size: 1.3rem;
            color: #7aa9ff;
        }

        .logo p {
            font-size: 0.7rem;
            color: #8f9bb5;
        }

        .status-area {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #13182b;
            padding: 0.3rem 1rem;
            border-radius: 40px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
        }

        .led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ff5e5e;
        }

        .led.active {
            background: #2eff8c;
            box-shadow: 0 0 6px #2eff8c;
        }

        button {
            background: #2a3457;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        button:hover {
            background: #3e4a70;
            transform: scale(0.98);
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 0;
        }

        .channel-sidebar {
            width: 380px;
            background: #0c1120;
            border-right: 1px solid #252b41;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 12px;
            background: #0a0f1c;
            border-bottom: 1px solid #1e243b;
        }

        .sidebar-header h3 {
            font-size: 0.95rem;
            margin-bottom: 8px;
        }

        .channel-search {
            width: 100%;
            padding: 8px 12px;
            background: #181f32;
            border: 1px solid #2c344e;
            border-radius: 25px;
            color: white;
            font-size: 0.8rem;
            outline: none;
            margin-bottom: 8px;
        }

        .group-filter {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            max-height: 80px;
            overflow-y: auto;
            padding: 4px 0;
        }

        .group-tag {
            background: #1e263f;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.1s;
            white-space: nowrap;
        }

        .group-tag:hover, .group-tag.active {
            background: #5f7ef2;
        }

        .channel-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .channel-list-container::-webkit-scrollbar {
            width: 5px;
        }
        .channel-list-container::-webkit-scrollbar-track {
            background: #0b1020;
        }
        .channel-list-container::-webkit-scrollbar-thumb {
            background: #37415e;
        }

        .channel-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px;
            margin: 3px 0;
            border-radius: 8px;
            background: #111725;
            cursor: pointer;
            transition: 0.1s;
            border-left: 3px solid transparent;
        }

        .channel-item:hover {
            background: #1b233b;
        }

        .channel-item.active {
            background: #1f2a4e;
            border-left-color: #5f7ef2;
        }

        .channel-name {
            font-size: 0.8rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 220px;
        }

        .channel-group-badge {
            font-size: 0.55rem;
            background: #2a3457;
            padding: 2px 6px;
            border-radius: 12px;
        }

        .player-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000000;
        }

        .video-container {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .controls {
            background: #0c1122;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            border-top: 1px solid #2a3048;
        }

        .control-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            font-size: 1.1rem;
            background: #1f253f;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #181f32;
            padding: 4px 12px;
            border-radius: 30px;
        }

        input[type="range"] {
            width: 100px;
            height: 4px;
            -webkit-appearance: none;
            background: #37415e;
            border-radius: 5px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #7aa9ff;
            cursor: pointer;
        }

        .info-bar {
            background: #000000aa;
            padding: 6px 12px;
            font-size: 0.75rem;
            text-align: center;
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            padding: 12px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            z-index: 20;
            white-space: nowrap;
        }

        .toast {
            position: fixed;
            bottom: 90px;
            right: 20px;
            background: #d32f2f;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            z-index: 200;
            animation: slideIn 0.3s;
            max-width: 300px;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .success-toast {
            background: #2e7d32;
        }

        .proxy-note {
            margin-top: 8px;
            padding: 6px;
            background: #ff980033;
            border-radius: 6px;
            font-size: 0.65rem;
            text-align: center;
        }

        @media (max-width: 768px) {
            .channel-sidebar { width: 280px; }
            .control-btn { width: 38px; height: 38px; font-size: 1rem; }
            .channel-name { max-width: 150px; }
            .loading { white-space: normal; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo">
            <h1>📺 IPTV Bengali Player</h1>
            <p>Working HLS Streams | CORS Proxy Enabled</p>
        </div>
        <div class="status-area">
            <div class="status-badge">
                <span class="led active" id="statusLed"></span>
                <span id="statusText">Ready</span>
            </div>
            <button id="loadM3UBtn">📡 Load Bengali M3U</button>
            <button id="useEmbeddedBtn" style="background:#4a5b8c;">⭐ Use Embedded Channels</button>
        </div>
    </div>

    <div class="main-content">
        <div class="channel-sidebar">
            <div class="sidebar-header">
                <h3>📺 Channels <span id="channelCount">0</span></h3>
                <input type="text" class="channel-search" id="searchInput" placeholder="🔍 Search channels...">
                <div class="group-filter" id="groupFilter"></div>
                <div class="proxy-note">
                    🔄 Using CORS proxy to fetch M3U. Click "Use Embedded Channels" for instant playback!
                </div>
            </div>
            <div class="channel-list-container" id="channelList">
                <div style="text-align:center; padding:20px;">Click "Use Embedded Channels" to start watching</div>
            </div>
        </div>

        <div class="player-area">
            <div class="video-container">
                <video id="videoPlayer" controls style="width:100%; height:100%;"></video>
                <div id="loadingOverlay" class="loading" style="display:none;">⏳ Loading stream...</div>
                <div id="infoBar" class="info-bar">🎬 Select a channel to play</div>
            </div>
            <div class="controls">
                <button class="control-btn" id="playBtn">▶️</button>
                <button class="control-btn" id="pauseBtn">⏸️</button>
                <button class="control-btn" id="stopBtn">⏹️</button>
                <div class="volume-control">
                    <span>🔊</span>
                    <input type="range" id="volumeSlider" min="0" max="100" value="70">
                </div>
                <button id="reloadStreamBtn" style="background:#4a5b8c;">⟳ Reload</button>
            </div>
        </div>
    </div>
</div>

        { name: "🇧🇩 Deepto TV", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1711/output/index.m3u8", group: "BANGLA" },
        { name: "🇧🇩 Maasranga Tv", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1722/output/1722-audio_113522_eng=113200-video=2202800.m3u8", group: "BANGLA" },
        { name: "🇧🇩 Channel 9", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1729/output/index.m3u8", group: "BANGLA" },
        { name: "🌍 Al Jazeera", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1721/output/index.m3u8", group: "English News" },
        { name: "🌍 BBC News", url: "http://cdns.jp-primehome.com:8000/zhongying/live/playlist.m3u8?cid=cs15", group: "English News" },
        { name: "🌍 CNN", url: "https://amg01448-samsungin-cnnnow-samsungin-4npqg.amagi.tv/playlist/amg01448-samsungin-cnnnow-samsungin/playlist.m3u8", group: "English News" },
        { name: "🕋 Saudi Quran", url: "https://cdn-globecast.akamaized.net/live/eds/saudi_quran/hls_roku/index.m3u8", group: "Islamic" },
        { name: "🕋 Madina live", url: "https://cdn-globecast.akamaized.net/live/eds/saudi_sunnah/hls_roku/index.m3u8", group: "Islamic" },
        { name: "📺 Discovery Bangla", url: "http://202.70.146.135:8000/play/a05z/index.m3u8", group: "Documentary" },
        { name: "📺 National Geographic", url: "http://202.70.146.135:8000/play/a05o/index.m3u8", group: "Documentary" },
        { name: "🎬 Star Jalsha", url: "http://103.229.254.25:7001/play/a075/index.m3u8", group: "Indian-Bangla" },
        { name: "🎬 Zee Bangla", url: "http://103.175.242.10:8080/zeebangla/index.m3u8", group: "Indian-Bangla" },
        { name: "🎵 Gaan Bangla", url: "http://103.229.254.25:7001/play/a072/index.m3u8", group: "MUSIC" },
        { name: "🏏 T-Sports", url: "https://mflixott.com/tv/plusbox/live/TSports/index.m3u8", group: "SPORTS" },
        { name: "🏏 Star Sports 1", url: "http://103.229.254.25:7001/play/a0dn/index.m3u8", group: "SPORTS" },
        { name: "🏏 Sony Sports", url: "http://103.229.254.25:7001/play/a0ef/index.m3u8", group: "SPORTS" }
    ];
    
    let channels = [];
    let filteredChannels = [];
    let currentChannel = null;
    let videoPlayer = null;
    let hls = null;
    let groups = new Set();
    let activeGroup = "All";
    
    // DOM elements
    const channelListDiv = document.getElementById('channelList');
    const searchInput = document.getElementById('searchInput');
    const groupFilterDiv = document.getElementById('groupFilter');
    const channelCountSpan = document.getElementById('channelCount');
    const statusLed = document.getElementById('statusLed');
    const statusText = document.getElementById('statusText');
    const loadM3UBtn = document.getElementById('loadM3UBtn');
    const useEmbeddedBtn = document.getElementById('useEmbeddedBtn');
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const stopBtn = document.getElementById('stopBtn');
    const reloadStreamBtn = document.getElementById('reloadStreamBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const infoBar = document.getElementById('infoBar');
    
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        if (!isError) toast.classList.add('success-toast');
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }
    
    function setStatus(message, isError = false) {
        statusText.textContent = message;
        if (isError) {
            statusLed.className = 'led';
        } else {
            statusLed.className = 'led active';
        }
    }
    
    function showLoading(show) {
        loadingOverlay.style.display = show ? 'block' : 'none';
    }
    
    function destroyHls() {
        if (hls) {
            hls.destroy();
            hls = null;
        }
    }
    
    function updateGroups() {
        const sortedGroups = Array.from(groups).sort();
        let html = `<div class="group-tag ${activeGroup === 'All' ? 'active' : ''}" data-group="All">All (${channels.length})</div>`;
        
        for (let group of sortedGroups) {
            const count = channels.filter(ch => ch.group === group).length;
            html += `<div class="group-tag ${activeGroup === group ? 'active' : ''}" data-group="${escapeHtml(group)}">${escapeHtml(group)} (${count})</div>`;
        }
        
        groupFilterDiv.innerHTML = html;
        
        document.querySelectorAll('.group-tag').forEach(tag => {
            tag.addEventListener('click', () => {
                activeGroup = tag.dataset.group;
                updateGroups();
                applyFilters();
            });
        });
    }
    
    function applyFilters() {
        const searchTerm = searchInput.value.toLowerCase();
        
        filteredChannels = channels.filter(ch => {
            if (activeGroup !== 'All' && ch.group !== activeGroup) return false;
            if (searchTerm && !ch.name.toLowerCase().includes(searchTerm)) return false;
            return true;
        });
        
        renderChannelList();
        channelCountSpan.textContent = filteredChannels.length;
    }
    
    function renderChannelList() {
        if (filteredChannels.length === 0) {
            channelListDiv.innerHTML = '<div style="padding:20px; text-align:center;">No channels found</div>';
            return;
        }
        
        let html = '';
        filteredChannels.forEach((ch, idx) => {
            const isActive = currentChannel && currentChannel.url === ch.url;
            const groupShort = ch.group.length > 12 ? ch.group.substring(0, 10) + '..' : ch.group;
            html += `
                <div class="channel-item ${isActive ? 'active' : ''}" data-index="${idx}">
                    <div class="channel-name" title="${escapeHtml(ch.name)}">📺 ${escapeHtml(ch.name)}</div>
                    <div class="channel-group-badge">${escapeHtml(groupShort)}</div>
                </div>
            `;
        });
        
        channelListDiv.innerHTML = html;
        
        document.querySelectorAll('.channel-item').forEach(item => {
            item.addEventListener('click', () => {
                const idx = parseInt(item.dataset.index);
                if (filteredChannels[idx]) {
                    selectChannel(filteredChannels[idx]);
                }
            });
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function selectChannel(channel) {
        if (!channel || !channel.url) return;
        
        currentChannel = channel;
        renderChannelList();
        
        infoBar.innerHTML = `📺 ${channel.name} (${channel.group}) - Loading...`;
        playStream(channel.url, channel.name);
    }
    
    function playStream(url, channelName) {
        showLoading(true);
        destroyHls();
        
        const video = document.getElementById('videoPlayer');
        video.pause();
        video.removeAttribute('src');
        video.load();
        
        const isHLS = url.includes('.m3u8') || url.includes('m3u8');
        
        if (isHLS && Hls.isSupported()) {
            hls = new Hls({
                enableWorker: true,
                lowLatencyMode: true,
                maxBufferLength: 30,
                manifestLoadingTimeOut: 15000,
                levelLoadingTimeOut: 15000,
                fragLoadingTimeOut: 20000,
            });
            
            hls.loadSource(url);
            hls.attachMedia(video);
            
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                showLoading(false);
                video.play().catch(e => {
                    showToast('Click play button to start', false);
                });
                infoBar.innerHTML = `🎬 Now Playing: ${channelName}`;
                setStatus(`Playing: ${channelName}`);
            });
            
            hls.on(Hls.Events.ERROR, (event, data) => {
                console.error('HLS Error:', data);
                if (data.fatal) {
                    showLoading(false);
                    infoBar.innerHTML = `❌ ${channelName} - Stream error`;
                    showToast(`Cannot play ${channelName}. Stream may be offline.`, true);
                }
            });
            
        } else if (isHLS && video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.addEventListener('loadedmetadata', () => {
                showLoading(false);
                video.play().catch(() => {});
                infoBar.innerHTML = `🎬 Now Playing: ${channelName}`;
            });
        } else {
            video.src = url;
            video.addEventListener('canplay', () => {
                showLoading(false);
                video.play().catch(e => {
                    showToast('Click play to start', false);
                });
                infoBar.innerHTML = `🎬 Now Playing: ${channelName}`;
            });
            
            video.onerror = () => {
                showLoading(false);
                infoBar.innerHTML = `❌ ${channelName} - Cannot play`;
                showToast(`Cannot play ${channelName}. Format may not be supported.`, true);
            };
        }
        
        setTimeout(() => {
            if (loadingOverlay.style.display !== 'none') {
                showLoading(false);
                if (video.paused) {
                    infoBar.innerHTML = `⏸️ ${channelName} - Click play`;
                }
            }
        }, 15000);
    }
    
    function reloadStream() {
        if (currentChannel) {
            showToast(`Reloading: ${currentChannel.name}`, false);
            playStream(currentChannel.url, currentChannel.name);
        } else if (channels.length > 0) {
            selectChannel(channels[0]);
        }
    }
    
    function useEmbeddedChannels() {
        channels = [...EMBEDDED_CHANNELS];
        groups.clear();
        channels.forEach(ch => groups.add(ch.group));
        filteredChannels = [...channels];
        updateGroups();
        renderChannelList();
        setStatus(`✅ ${channels.length} embedded channels ready`);
        showToast(`${channels.length} Bengali channels loaded! Click any to play.`, false);
        
        if (channels.length > 0 && !currentChannel) {
            selectChannel(channels[0]);
        }
    }
    
    async function fetchM3UWithProxy() {
        const m3uUrl = "https://raw.githubusercontent.com/sydul104/main04/refs/heads/main/my";
        const proxies = [
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?',
            'https://cors-anywhere.herokuapp.com/'
        ];
        
        setStatus('Fetching M3U via proxy...');
        
        for (let i = 0; i < proxies.length; i++) {
            try {
                const proxyUrl = proxies[i] + encodeURIComponent(m3uUrl);
                const response = await fetch(proxyUrl);
                if (response.ok) {
                    const text = await response.text();
                    if (text.includes('#EXTM3U') || text.includes('#EXTINF')) {
                        const parsed = parseM3UFromText(text);
                        if (parsed.length > 0) {
                            channels = parsed;
                            groups.clear();
                            channels.forEach(ch => groups.add(ch.group));
                            filteredChannels = [...channels];
                            updateGroups();
                            renderChannelList();
                            setStatus(`✅ ${channels.length} channels loaded`);
                            showToast(`Loaded ${channels.length} channels!`, false);
                            if (channels.length > 0 && !currentChannel) {
                                selectChannel(channels[0]);
                            }
                            return;
                        }
                    }
                }
            } catch (e) {
                console.log(`Proxy ${i+1} failed`);
            }
        }
        
        setStatus('Failed to fetch M3U. Using embedded channels.', true);
        showToast('Could not fetch M3U. Using embedded Bengali channels instead.', true);
        useEmbeddedChannels();
    }
    
    function parseM3UFromText(content) {
        const lines = content.split(/\r?\n/);
        const parsed = [];
        let current = null;
        
        for (let line of lines) {
            line = line.trim();
            if (line.startsWith('#EXTINF:')) {
                if (current && current.url) {
                    parsed.push(current);
                }
                current = { name: '', url: '', group: 'General' };
                const groupMatch = line.match(/group-title="([^"]*)"/);
                if (groupMatch) current.group = groupMatch[1];
                const lastComma = line.lastIndexOf(',');
                if (lastComma !== -1) {
                    current.name = line.substring(lastComma + 1).trim().replace(/^["']|["']$/g, '');
                }
            } else if (line && !line.startsWith('#') && current) {
                if (line.startsWith('http://') || line.startsWith('https://')) {
                    current.url = line;
                }
            }
        }
        if (current && current.url) parsed.push(current);
        return parsed.filter(ch => ch.url && ch.url.length > 10);
    }
    
    function initVideo() {
        videoPlayer = document.getElementById('videoPlayer');
        videoPlayer.volume = volumeSlider.value / 100;
    }
    
    // Event listeners
    loadM3UBtn.addEventListener('click', fetchM3UWithProxy);
    useEmbeddedBtn.addEventListener('click', useEmbeddedChannels);
    
    playBtn.addEventListener('click', () => {
        if (videoPlayer && videoPlayer.src) {
            videoPlayer.play().catch(e => showToast('Click video to play', false));
        } else if (currentChannel) {
            playStream(currentChannel.url, currentChannel.name);
        } else if (channels.length > 0) {
            selectChannel(channels[0]);
        } else {
            showToast('Load channels first', true);
        }
    });
    
    pauseBtn.addEventListener('click', () => {
        if (videoPlayer) videoPlayer.pause();
    });
    
    stopBtn.addEventListener('click', () => {
        destroyHls();
        if (videoPlayer) {
            videoPlayer.pause();
            videoPlayer.removeAttribute('src');
            videoPlayer.load();
        }
        infoBar.innerHTML = '⏹️ Stopped';
    });
    
    reloadStreamBtn.addEventListener('click', reloadStream);
    
    volumeSlider.addEventListener('input', () => {
        if (videoPlayer) videoPlayer.volume = volumeSlider.value / 100;
    });
    
    searchInput.addEventListener('input', () => {
        applyFilters();
    });
    
    // Initialize
    initVideo();
    setStatus('Ready - Click "Use Embedded Channels"');
    
    // Auto-load embedded channels on start
    setTimeout(() => {
        useEmbeddedChannels();
    }, 500);
    
    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && document.activeElement !== searchInput) {
            e.preventDefault();
            if (videoPlayer.paused) videoPlayer.play().catch(() => {});
            else videoPlayer.pause();
        }
        if (e.code === 'KeyR' && e.ctrlKey) {
            e.preventDefault();
            reloadStream();
        }
    });
</script>
</body>
</html>
