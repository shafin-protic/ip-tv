<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IPTV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #000000;
        }

        .header {
            background: #000000;
            padding: 12px 20px;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo h1 {
            font-size: 1.1rem;
            font-weight: 500;
            color: #ffffff;
            letter-spacing: -0.3px;
        }

        .logo p {
            font-size: 0.65rem;
            color: #666;
            margin-top: 2px;
        }

        .status-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: #888;
        }

        .led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff5e5e;
        }

        .led.active {
            background: #2eff8c;
        }

        button {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #ffffff;
            padding: 5px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        button:hover {
            background: #2a2a2a;
            border-color: #3a3a3a;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 0;
        }

        .channel-sidebar {
            width: 280px;
            background: #000000;
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 12px 16px;
            border-bottom: 1px solid #1a1a1a;
        }

        .channel-search {
            width: 100%;
            padding: 8px 12px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 6px;
            color: #ffffff;
            font-size: 0.75rem;
            outline: none;
        }

        .channel-search:focus {
            border-color: #3a3a3a;
        }

        .channel-search::placeholder {
            color: #444;
        }

        .channel-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .channel-list-container::-webkit-scrollbar {
            width: 4px;
        }
        .channel-list-container::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        .channel-list-container::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 4px;
        }

        .channel-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            margin: 2px 0;
            border-radius: 6px;
            background: transparent;
            cursor: pointer;
            transition: all 0.15s;
        }

        .channel-item:hover {
            background: #0f0f0f;
        }

        .channel-item.active {
            background: #0f0f0f;
            border-left: 2px solid #ffffff;
        }

        .channel-name {
            font-size: 0.75rem;
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
            color: #e0e0e0;
        }

        .channel-group {
            font-size: 0.6rem;
            color: #666;
            background: #0a0a0a;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .player-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000000;
            position: relative;
        }

        .video-container {
            flex: 1;
            background: #000000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000000;
        }

        .controls {
            background: #000000;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            border-top: 1px solid #1a1a1a;
        }

        .control-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1rem;
            background: #0f0f0f;
            border: 1px solid #1a1a1a;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .control-btn:hover {
            background: #1a1a1a;
            transform: scale(0.98);
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0f0f0f;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #1a1a1a;
        }

        .volume-control span {
            font-size: 0.75rem;
            color: #888;
        }

        input[type="range"] {
            width: 80px;
            height: 3px;
            -webkit-appearance: none;
            background: #2a2a2a;
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.75rem;
            z-index: 20;
            color: #888;
            border: 1px solid #1a1a1a;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: #1a1a1a;
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.7rem;
            z-index: 200;
            animation: fadeIn 0.2s ease;
            border: 1px solid #2a2a2a;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .success-toast {
            background: #0f0f0f;
            border-color: #2a2a2a;
        }

        @media (max-width: 768px) {
            .channel-sidebar { width: 240px; }
            .control-btn { width: 32px; height: 32px; font-size: 0.9rem; }
            .controls { gap: 12px; padding: 10px 16px; }
            .channel-name { max-width: 140px; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo">
            <h1>IPTV</h1>
            <p>M3U Player</p>
        </div>
        <div class="status-area">
            <div class="status-badge">
                <span class="led" id="statusLed"></span>
                <span id="statusText">Ready</span>
            </div>
            <button id="loadM3UBtn">Load M3U</button>
        </div>
    </div>

    <div class="main-content">
        <div class="channel-sidebar">
            <div class="sidebar-header">
                <input type="text" class="channel-search" id="searchInput" placeholder="Search channels...">
            </div>
            <div class="channel-list-container" id="channelList">
                <div style="text-align:center; padding:40px 20px; font-size:0.7rem; color:#444;">Click Load M3U</div>
            </div>
        </div>

        <div class="player-area">
            <div class="video-container">
                <video id="videoPlayer" controls style="width:100%; height:100%;"></video>
                <div id="loadingOverlay" class="loading" style="display:none;">Loading...</div>
            </div>
            <div class="controls">
                <button class="control-btn" id="playBtn">▶</button>
                <button class="control-btn" id="pauseBtn">⏸</button>
                <button class="control-btn" id="stopBtn">⏹</button>
                <div class="volume-control">
                    <span>🔊</span>
                    <input type="range" id="volumeSlider" min="0" max="100" value="70">
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const M3U_URL = "https://raw.githubusercontent.com/sydul104/main04/refs/heads/main/my";
    
    let channels = [];
    let filteredChannels = [];
    let currentChannel = null;
    let videoPlayer = null;
    let hls = null;
    
    // DOM elements
    const channelListDiv = document.getElementById('channelList');
    const searchInput = document.getElementById('searchInput');
    const statusLed = document.getElementById('statusLed');
    const statusText = document.getElementById('statusText');
    const loadM3UBtn = document.getElementById('loadM3UBtn');
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const stopBtn = document.getElementById('stopBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const loadingOverlay = document.getElementById('loadingOverlay');
    
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        if (!isError) toast.classList.add('success-toast');
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function setStatus(message, isError = false) {
        statusText.textContent = message;
        statusLed.className = isError ? 'led' : 'led active';
    }
    
    function showLoading(show) {
        loadingOverlay.style.display = show ? 'block' : 'none';
    }
    
    function destroyHls() {
        if (hls) {
            hls.destroy();
            hls = null;
        }
    }
    
    function parseM3U(content) {
        const lines = content.split(/\r?\n/);
        const parsed = [];
        let current = null;
        
        for (let line of lines) {
            line = line.trim();
            if (line.startsWith('#EXTINF:')) {
                if (current && current.url) {
                    parsed.push(current);
                }
                current = { name: '', url: '', group: 'General' };
                const groupMatch = line.match(/group-title="([^"]*)"/);
                if (groupMatch) current.group = groupMatch[1];
                const lastComma = line.lastIndexOf(',');
                if (lastComma !== -1) {
                    current.name = line.substring(lastComma + 1).trim().replace(/^["']|["']$/g, '');
                }
                if (!current.name) current.name = 'Unknown';
            } 
            else if (line && !line.startsWith('#') && current) {
                if (line.startsWith('http://') || line.startsWith('https://')) {
                    current.url = line;
                }
            }
        }
        if (current && current.url) parsed.push(current);
        return parsed.filter(ch => ch.url && ch.url.length > 10);
    }
    
    async function fetchM3U() {
        // Comprehensive list of working proxies
        const proxies = [
            'https://api.allorigins.win/raw?url=',
            'https://corsproxy.io/?',
            'https://cors-anywhere.herokuapp.com/',
            'https://thingproxy.freeboard.io/fetch/',
            'https://api.codetabs.com/v1/proxy?quest='
        ];
        
        setStatus('Fetching...');
        showToast('Loading M3U...');
        
        // Try each proxy
        for (let i = 0; i < proxies.length; i++) {
            try {
                const proxyUrl = proxies[i] + encodeURIComponent(M3U_URL);
                console.log(`Trying proxy ${i+1}: ${proxies[i]}`);
                
                const response = await fetch(proxyUrl, {
                    method: 'GET',
                    headers: {
                        'Accept': 'text/plain, application/vnd.apple.mpegurl, */*'
                    }
                });
                
                if (response.ok) {
                    const text = await response.text();
                    // Check if we got actual M3U content
                    if (text && (text.includes('#EXTM3U') || text.includes('#EXTINF'))) {
                        const parsed = parseM3U(text);
                        if (parsed.length > 0) {
                            channels = parsed;
                            filteredChannels = [...channels];
                            renderChannelList();
                            setStatus(`${channels.length} channels`);
                            showToast(`Loaded ${channels.length} channels`, false);
                            
                            // Auto-select first channel
                            if (channels.length > 0 && !currentChannel) {
                                selectChannel(channels[0]);
                            }
                            return;
                        }
                    }
                }
            } catch (e) {
                console.log(`Proxy ${i+1} failed:`, e.message);
            }
        }
        
        // If all proxies fail, try direct fetch (might work in some environments)
        try {
            console.log('Trying direct fetch...');
            const response = await fetch(M3U_URL, {
                mode: 'cors',
                cache: 'no-store'
            });
            if (response.ok) {
                const text = await response.text();
                if (text && (text.includes('#EXTM3U') || text.includes('#EXTINF'))) {
                    const parsed = parseM3U(text);
                    if (parsed.length > 0) {
                        channels = parsed;
                        filteredChannels = [...channels];
                        renderChannelList();
                        setStatus(`${channels.length} channels`);
                        showToast(`Loaded ${channels.length} channels`, false);
                        if (channels.length > 0 && !currentChannel) {
                            selectChannel(channels[0]);
                        }
                        return;
                    }
                }
            }
        } catch (e) {
            console.log('Direct fetch failed:', e.message);
        }
        
        setStatus('Failed', true);
        showToast('Failed to load M3U. Please check your connection.', true);
        channelListDiv.innerHTML = '<div style="text-align:center; padding:40px 20px; font-size:0.7rem; color:#444;">Failed to load<br>Click Load M3U to retry</div>';
    }
    
    function renderChannelList() {
        const searchTerm = searchInput.value.toLowerCase();
        filteredChannels = channels.filter(ch => 
            ch.name.toLowerCase().includes(searchTerm) || 
            ch.group.toLowerCase().includes(searchTerm)
        );
        
        if (filteredChannels.length === 0) {
            channelListDiv.innerHTML = '<div style="text-align:center; padding:40px 20px; font-size:0.7rem; color:#444;">No channels found</div>';
            return;
        }
        
        let html = '';
        filteredChannels.forEach((ch, idx) => {
            const isActive = currentChannel && currentChannel.url === ch.url;
            html += `
                <div class="channel-item ${isActive ? 'active' : ''}" data-index="${idx}">
                    <div class="channel-name" title="${escapeHtml(ch.name)}">${escapeHtml(ch.name)}</div>
                    <div class="channel-group">${escapeHtml(ch.group.substring(0, 12))}</div>
                </div>
            `;
        });
        
        channelListDiv.innerHTML = html;
        
        document.querySelectorAll('.channel-item').forEach(item => {
            item.addEventListener('click', () => {
                const idx = parseInt(item.dataset.index);
                if (filteredChannels[idx]) {
                    selectChannel(filteredChannels[idx]);
                }
            });
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function selectChannel(channel) {
        if (!channel || !channel.url) return;
        
        currentChannel = channel;
        renderChannelList();
        playStream(channel.url);
    }
    
    function playStream(url) {
        showLoading(true);
        destroyHls();
        
        const video = document.getElementById('videoPlayer');
        video.pause();
        video.removeAttribute('src');
        video.load();
        
        const isHLS = url.includes('.m3u8') || url.includes('m3u8');
        
        if (isHLS && Hls.isSupported()) {
            hls = new Hls({
                enableWorker: true,
                lowLatencyMode: true,
                maxBufferLength: 30,
                manifestLoadingTimeOut: 15000,
                levelLoadingTimeOut: 15000,
                fragLoadingTimeOut: 20000,
                debug: false
            });
            
            hls.loadSource(url);
            hls.attachMedia(video);
            
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                showLoading(false);
                video.play().catch(() => {
                    // Autoplay blocked - user will need to click play
                });
            });
            
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    switch(data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            showToast('Network error, retrying...', true);
                            hls.startLoad();
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            showToast('Media error', true);
                            hls.recoverMediaError();
                            break;
                        default:
                            showLoading(false);
                            showToast('Stream unavailable', true);
                            break;
                    }
                }
            });
            
        } else if (isHLS && video.canPlayType('application/vnd.apple.mpegurl')) {
            // Safari native HLS
            video.src = url;
            video.addEventListener('loadedmetadata', () => {
                showLoading(false);
                video.play().catch(() => {});
            });
        } else {
            // Regular stream
            video.src = url;
            video.addEventListener('canplay', () => {
                showLoading(false);
                video.play().catch(() => {});
            });
            video.onerror = () => {
                showLoading(false);
                showToast('Cannot play this stream', true);
            };
        }
        
        // Timeout for loading
        setTimeout(() => {
            if (loadingOverlay.style.display !== 'none') {
                showLoading(false);
            }
        }, 15000);
    }
    
    function initVideo() {
        videoPlayer = document.getElementById('videoPlayer');
        videoPlayer.volume = volumeSlider.value / 100;
    }
    
    // Event listeners
    loadM3UBtn.addEventListener('click', () => {
        fetchM3U();
    });
    
    playBtn.addEventListener('click', () => {
        if (videoPlayer && videoPlayer.src) {
            videoPlayer.play().catch(() => {
                showToast('Click the video to play', false);
            });
        } else if (currentChannel) {
            playStream(currentChannel.url);
        } else if (channels.length > 0) {
            selectChannel(channels[0]);
        } else {
            showToast('Load channels first', true);
        }
    });
    
    pauseBtn.addEventListener('click', () => {
        if (videoPlayer) videoPlayer.pause();
    });
    
    stopBtn.addEventListener('click', () => {
        destroyHls();
        if (videoPlayer) {
            videoPlayer.pause();
            videoPlayer.removeAttribute('src');
            videoPlayer.load();
        }
    });
    
    volumeSlider.addEventListener('input', () => {
        if (videoPlayer) videoPlayer.volume = volumeSlider.value / 100;
    });
    
    searchInput.addEventListener('input', () => {
        renderChannelList();
    });
    
    // Initialize
    initVideo();
    setStatus('Ready');
    
    // Auto-load on start
    setTimeout(() => {
        fetchM3U();
    }, 500);
    
    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && document.activeElement !== searchInput) {
            e.preventDefault();
            if (videoPlayer.paused) videoPlayer.play().catch(() => {});
            else videoPlayer.pause();
        }
    });
</script>
</body>
</html>
