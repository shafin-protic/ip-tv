<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>IPTV Player - TV & Radio Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            background: #000000;
        }

        .header {
            background: #000000;
            padding: 12px 20px;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            flex-shrink: 0;
        }

        .logo h1 {
            font-size: 1.1rem;
            font-weight: 500;
            color: #ffffff;
        }

        .logo p {
            font-size: 0.65rem;
            color: #666;
            margin-top: 2px;
        }

        .status-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            color: #888;
        }

        .led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff5e5e;
        }

        .led.active {
            background: #2eff8c;
        }

        button {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            color: #ffffff;
            padding: 5px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        button:hover {
            background: #2a2a2a;
        }

        .mode-toggle {
            display: flex;
            gap: 6px;
            background: #0a0a0a;
            padding: 3px;
            border-radius: 8px;
            border: 1px solid #1a1a1a;
        }

        .mode-btn {
            background: transparent;
            border: none;
            padding: 4px 12px;
            font-size: 0.7rem;
            border-radius: 6px;
            cursor: pointer;
        }

        .mode-btn.active {
            background: #2a2a2a;
            color: #ffffff;
        }

        .main-content {
            display: flex;
            flex: 1;
            overflow: hidden;
            min-height: 0;
        }

        .channel-sidebar {
            width: 280px;
            background: #000000;
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 12px 16px;
            border-bottom: 1px solid #1a1a1a;
            flex-shrink: 0;
        }

        .channel-search {
            width: 100%;
            padding: 8px 12px;
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 6px;
            color: #ffffff;
            font-size: 0.75rem;
            outline: none;
        }

        .channel-search:focus {
            border-color: #3a3a3a;
        }

        .channel-list-container {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .channel-list-container::-webkit-scrollbar {
            width: 4px;
        }
        .channel-list-container::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        .channel-list-container::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 4px;
        }

        .channel-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            margin: 2px 0;
            border-radius: 6px;
            background: transparent;
            cursor: pointer;
            transition: all 0.15s;
        }

        .channel-item:hover {
            background: #0f0f0f;
        }

        .channel-item.active {
            background: #0f0f0f;
            border-left: 2px solid #ffffff;
        }

        .channel-name {
            font-size: 0.75rem;
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
            color: #e0e0e0;
        }

        .channel-badge {
            font-size: 0.55rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: #1a1a1a;
            color: #888;
        }

        .channel-badge.radio {
            background: #2a2a2a;
            color: #7aa9ff;
        }

        .player-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000000;
            min-width: 0;
            overflow: hidden;
        }

        .video-container {
            flex: 1;
            background: #000000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 0;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .video-container.radio-mode {
            flex: 0;
            height: 0;
            min-height: 0;
            display: none;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000000;
        }

        /* Radio Mode Visualizer */
        .radio-visualizer {
            flex: 1;
            background: linear-gradient(135deg, #0a0a0a 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            display: none;
        }

        .radio-visualizer.active {
            display: flex;
        }

        .radio-icon {
            font-size: 4rem;
            filter: drop-shadow(0 0 20px rgba(122, 169, 255, 0.3));
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .radio-station-name {
            font-size: 1.2rem;
            font-weight: 500;
            color: #ffffff;
            text-align: center;
            max-width: 80%;
        }

        .radio-group {
            font-size: 0.8rem;
            color: #666;
        }

        .equalizer {
            display: flex;
            gap: 4px;
            align-items: center;
            justify-content: center;
            height: 40px;
        }

        .equalizer-bar {
            width: 4px;
            height: 20px;
            background: #7aa9ff;
            border-radius: 2px;
            animation: equalize 1s infinite ease-in-out;
        }

        .equalizer-bar:nth-child(1) { animation-delay: 0s; height: 15px; }
        .equalizer-bar:nth-child(2) { animation-delay: 0.2s; height: 25px; }
        .equalizer-bar:nth-child(3) { animation-delay: 0.4s; height: 10px; }
        .equalizer-bar:nth-child(4) { animation-delay: 0.6s; height: 30px; }
        .equalizer-bar:nth-child(5) { animation-delay: 0.8s; height: 20px; }
        .equalizer-bar:nth-child(6) { animation-delay: 1s; height: 12px; }

        @keyframes equalize {
            0%, 100% { height: 10px; }
            50% { height: 30px; }
        }

        .controls {
            background: #000000;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            border-top: 1px solid #1a1a1a;
            flex-shrink: 0;
        }

        .control-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1rem;
            background: #0f0f0f;
            border: 1px solid #1a1a1a;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .control-btn:hover {
            background: #1a1a1a;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0f0f0f;
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #1a1a1a;
        }

        .volume-control span {
            font-size: 0.75rem;
            color: #888;
        }

        input[type="range"] {
            width: 80px;
            height: 3px;
            -webkit-appearance: none;
            background: #2a2a2a;
            border-radius: 3px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.75rem;
            z-index: 20;
            color: #888;
            border: 1px solid #1a1a1a;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: #1a1a1a;
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 0.7rem;
            z-index: 200;
            animation: fadeIn 0.2s ease;
            border: 1px solid #2a2a2a;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 768px) {
            .channel-sidebar { width: 240px; }
            .control-btn { width: 32px; height: 32px; font-size: 0.9rem; }
            .controls { gap: 12px; padding: 10px 16px; }
            .channel-name { max-width: 140px; }
            .radio-station-name { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo">
            <h1>IPTV</h1>
            <p>TV + Radio</p>
        </div>
        <div class="status-area">
            <div class="mode-toggle">
                <button class="mode-btn active" id="tvModeBtn">📺 TV</button>
                <button class="mode-btn" id="radioModeBtn">🎵 Radio</button>
            </div>
            <div class="status-badge">
                <span class="led" id="statusLed"></span>
                <span id="statusText">Ready</span>
            </div>
            <button id="loadM3UBtn">Load M3U</button>
        </div>
    </div>

    <div class="main-content">
        <div class="channel-sidebar">
            <div class="sidebar-header">
                <input type="text" class="channel-search" id="searchInput" placeholder="Search channels...">
            </div>
            <div class="channel-list-container" id="channelList">
                <div style="text-align:center; padding:40px 20px; font-size:0.7rem; color:#444;">Click Load M3U</div>
            </div>
        </div>

        <div class="player-area">
            <div class="video-container" id="videoContainer">
                <video id="videoPlayer" controls style="width:100%; height:100%;"></video>
                <div id="loadingOverlay" class="loading" style="display:none;">Loading...</div>
            </div>
            
            <div class="radio-visualizer" id="radioVisualizer">
                <div class="radio-icon">🎵</div>
                <div class="equalizer">
                    <div class="equalizer-bar"></div>
                    <div class="equalizer-bar"></div>
                    <div class="equalizer-bar"></div>
                    <div class="equalizer-bar"></div>
                    <div class="equalizer-bar"></div>
                    <div class="equalizer-bar"></div>
                </div>
                <div class="radio-station-name" id="radioStationName">Select a station</div>
                <div class="radio-group" id="radioGroupName"></div>
            </div>
            
            <div class="controls">
                <button class="control-btn" id="playBtn">▶</button>
                <button class="control-btn" id="pauseBtn">⏸</button>
                <button class="control-btn" id="stopBtn">⏹</button>
                <div class="volume-control">
                    <span>🔊</span>
                    <input type="range" id="volumeSlider" min="0" max="100" value="70">
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const M3U_URL = "https://raw.githubusercontent.com/sydul104/main04/refs/heads/main/my";
    
    let channels = [];
    let filteredChannels = [];
    let currentChannel = null;
    let videoPlayer = null;
    let hls = null;
    let currentMode = 'tv'; // 'tv' or 'radio'
    let cachedChannels = null;
    let lastFetchTime = 0;
    const CACHE_DURATION = 5 * 60 * 1000;
    
    // DOM elements
    const channelListDiv = document.getElementById('channelList');
    const searchInput = document.getElementById('searchInput');
    const statusLed = document.getElementById('statusLed');
    const statusText = document.getElementById('statusText');
    const loadM3UBtn = document.getElementById('loadM3UBtn');
    const tvModeBtn = document.getElementById('tvModeBtn');
    const radioModeBtn = document.getElementById('radioModeBtn');
    const videoContainer = document.getElementById('videoContainer');
    const radioVisualizer = document.getElementById('radioVisualizer');
    const radioStationName = document.getElementById('radioStationName');
    const radioGroupName = document.getElementById('radioGroupName');
    const playBtn = document.getElementById('playBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const stopBtn = document.getElementById('stopBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const loadingOverlay = document.getElementById('loadingOverlay');
    
    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        if (!isError) toast.classList.add('success-toast');
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function setStatus(message, isError = false) {
        statusText.textContent = message;
        statusLed.className = isError ? 'led' : 'led active';
    }
    
    function showLoading(show) {
        loadingOverlay.style.display = show ? 'block' : 'none';
    }
    
    function destroyHls() {
        if (hls) {
            hls.destroy();
            hls = null;
        }
    }
    
    function switchMode(mode) {
        currentMode = mode;
        
        if (mode === 'tv') {
            videoContainer.classList.remove('radio-mode');
            radioVisualizer.classList.remove('active');
            tvModeBtn.classList.add('active');
            radioModeBtn.classList.remove('active');
            
            // If there's a current channel, restart playback in TV mode
            if (currentChannel) {
                playStream(currentChannel.url, currentChannel.name);
            }
        } else {
            videoContainer.classList.add('radio-mode');
            radioVisualizer.classList.add('active');
            radioModeBtn.classList.add('active');
            tvModeBtn.classList.remove('active');
            
            // If there's a current channel, restart playback in Radio mode
            if (currentChannel) {
                playStream(currentChannel.url, currentChannel.name);
            }
        }
    }
    
    function updateRadioDisplay(channel) {
        radioStationName.textContent = channel.name;
        radioGroupName.textContent = channel.group;
    }
    
    function parseM3U(content) {
        const lines = content.split(/\r?\n/);
        const parsed = [];
        let current = null;
        
        for (let line of lines) {
            line = line.trim();
            if (line.startsWith('#EXTINF:')) {
                if (current && current.url) {
                    parsed.push(current);
                }
                current = { name: '', url: '', group: 'General' };
                const groupMatch = line.match(/group-title="([^"]*)"/);
                if (groupMatch) current.group = groupMatch[1];
                const lastComma = line.lastIndexOf(',');
                if (lastComma !== -1) {
                    current.name = line.substring(lastComma + 1).trim().replace(/^["']|["']$/g, '');
                }
                if (!current.name) current.name = 'Unknown';
            } 
            else if (line && !line.startsWith('#') && current) {
                if (line.startsWith('http://') || line.startsWith('https://')) {
                    current.url = line;
                }
            }
        }
        if (current && current.url) parsed.push(current);
        return parsed.filter(ch => ch.url && ch.url.length > 10);
    }
    
    async function fetchM3UParallel() {
        if (cachedChannels && (Date.now() - lastFetchTime) < CACHE_DURATION) {
            channels = cachedChannels;
            filteredChannels = [...channels];
            renderChannelList();
            setStatus(`${channels.length} channels (cached)`);
            showToast(`Loaded ${channels.length} channels`, false);
            if (channels.length > 0 && !currentChannel) {
                selectChannel(channels[0]);
            }
            return true;
        }
        
        const proxies = [
            { url: 'https://api.allorigins.win/raw?url=', timeout: 5000 },
            { url: 'https://corsproxy.io/?', timeout: 5000 },
            { url: 'https://cors-anywhere.herokuapp.com/', timeout: 8000 },
            { url: 'https://thingproxy.freeboard.io/fetch/', timeout: 8000 }
        ];
        
        setStatus('Fetching...');
        
        const fetchPromises = proxies.map(proxy => {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), proxy.timeout);
            
            return fetch(proxy.url + encodeURIComponent(M3U_URL), {
                signal: controller.signal,
                headers: { 'Accept': 'text/plain, */*' }
            })
            .then(response => {
                clearTimeout(timeoutId);
                if (response.ok) return response.text();
                throw new Error('Failed');
            })
            .then(text => {
                if (text && (text.includes('#EXTM3U') || text.includes('#EXTINF'))) {
                    return text;
                }
                throw new Error('Invalid M3U');
            })
            .catch(() => null);
        });
        
        try {
            const results = await Promise.race([
                Promise.any(fetchPromises),
                new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), 10000))
            ]);
            
            if (results) {
                const parsed = parseM3U(results);
                if (parsed.length > 0) {
                    channels = parsed;
                    filteredChannels = [...channels];
                    cachedChannels = channels;
                    lastFetchTime = Date.now();
                    renderChannelList();
                    setStatus(`${channels.length} channels`);
                    showToast(`Loaded ${channels.length} channels`, false);
                    if (channels.length > 0 && !currentChannel) {
                        selectChannel(channels[0]);
                    }
                    return true;
                }
            }
        } catch (e) {
            console.log('All proxies failed:', e);
        }
        
        setStatus('Failed', true);
        showToast('Failed to load M3U', true);
        channelListDiv.innerHTML = '<div style="text-align:center; padding:40px 20px; font-size:0.7rem; color:#444;">Failed to load<br>Click Load M3U to retry</div>';
        return false;
    }
    
    function renderChannelList() {
        const searchTerm = searchInput.value.toLowerCase();
        filteredChannels = channels.filter(ch => 
            ch.name.toLowerCase().includes(searchTerm) || 
            ch.group.toLowerCase().includes(searchTerm)
        );
        
        if (filteredChannels.length === 0) {
            channelListDiv.innerHTML = '<div style="text-align:center; padding:40px 20px; font-size:0.7rem; color:#444;">No channels found</div>';
            return;
        }
        
        let html = '';
        filteredChannels.forEach((ch, idx) => {
            const isActive = currentChannel && currentChannel.url === ch.url;
            const isRadio = ch.group === 'FM-Radio' || ch.group.includes('Radio') || ch.name.toLowerCase().includes('radio');
            html += `
                <div class="channel-item ${isActive ? 'active' : ''}" data-index="${idx}">
                    <div class="channel-name" title="${escapeHtml(ch.name)}">${isRadio ? '🎵' : '📺'} ${escapeHtml(ch.name)}</div>
                    <div class="channel-badge ${isRadio ? 'radio' : ''}">${escapeHtml(ch.group.substring(0, 10))}</div>
                </div>
            `;
        });
        
        channelListDiv.innerHTML = html;
        
        document.querySelectorAll('.channel-item').forEach(item => {
            item.addEventListener('click', () => {
                const idx = parseInt(item.dataset.index);
                if (filteredChannels[idx]) {
                    selectChannel(filteredChannels[idx]);
                }
            });
        });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function selectChannel(channel) {
        if (!channel || !channel.url) return;
        
        currentChannel = channel;
        renderChannelList();
        updateRadioDisplay(channel);
        playStream(channel.url, channel.name);
    }
    
    function playStream(url, channelName) {
        showLoading(true);
        destroyHls();
        
        const video = document.getElementById('videoPlayer');
        
        if (currentMode === 'radio') {
            // In radio mode, hide video but keep audio playing
            video.style.display = 'none';
            updateRadioDisplay(currentChannel);
        } else {
            video.style.display = 'block';
        }
        
        video.pause();
        video.removeAttribute('src');
        video.load();
        
        const isHLS = url.includes('.m3u8') || url.includes('m3u8');
        
        if (isHLS && Hls.isSupported()) {
            hls = new Hls({
                enableWorker: true,
                lowLatencyMode: true,
                maxBufferLength: 30,
                manifestLoadingTimeOut: 10000,
                levelLoadingTimeOut: 10000,
                fragLoadingTimeOut: 15000,
            });
            
            hls.loadSource(url);
            hls.attachMedia(video);
            
            hls.on(Hls.Events.MANIFEST_PARSED, () => {
                showLoading(false);
                video.play().catch(() => {});
            });
            
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    showLoading(false);
                    showToast('Stream unavailable', true);
                }
            });
            
        } else if (isHLS && video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = url;
            video.addEventListener('loadedmetadata', () => {
                showLoading(false);
                video.play().catch(() => {});
            });
        } else {
            video.src = url;
            video.addEventListener('canplay', () => {
                showLoading(false);
                video.play().catch(() => {});
            });
            video.onerror = () => {
                showLoading(false);
                showToast('Cannot play this stream', true);
            };
        }
        
        setTimeout(() => {
            if (loadingOverlay.style.display !== 'none') {
                showLoading(false);
            }
        }, 15000);
    }
    
    function initVideo() {
        videoPlayer = document.getElementById('videoPlayer');
        videoPlayer.volume = volumeSlider.value / 100;
    }
    
    // Event listeners
    tvModeBtn.addEventListener('click', () => switchMode('tv'));
    radioModeBtn.addEventListener('click', () => switchMode('radio'));
    loadM3UBtn.addEventListener('click', () => fetchM3UParallel());
    
    playBtn.addEventListener('click', () => {
        if (videoPlayer && videoPlayer.src) {
            videoPlayer.play().catch(() => {});
        } else if (currentChannel) {
            playStream(currentChannel.url, currentChannel.name);
        } else if (channels.length > 0) {
            selectChannel(channels[0]);
        } else {
            showToast('Load channels first', true);
        }
    });
    
    pauseBtn.addEventListener('click', () => {
        if (videoPlayer) videoPlayer.pause();
    });
    
    stopBtn.addEventListener('click', () => {
        destroyHls();
        if (videoPlayer) {
            videoPlayer.pause();
            videoPlayer.removeAttribute('src');
            videoPlayer.load();
        }
    });
    
    volumeSlider.addEventListener('input', () => {
        if (videoPlayer) videoPlayer.volume = volumeSlider.value / 100;
    });
    
    searchInput.addEventListener('input', () => {
        renderChannelList();
    });
    
    // Initialize
    initVideo();
    setStatus('Ready');
    
    // Auto-load on start
    setTimeout(() => {
        fetchM3UParallel();
    }, 100);
    
    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && document.activeElement !== searchInput) {
            e.preventDefault();
            if (videoPlayer.paused) videoPlayer.play().catch(() => {});
            else videoPlayer.pause();
        }
    });
</script>
</body>
</html>
